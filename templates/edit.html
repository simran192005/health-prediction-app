<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient Datat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">Edit Patient Record</h2>
        <form method="POST">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="full_name"
                       value="{{ patient.full_name }}"
                       class="form-control" required></div>
            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" name="dob"
                       value="{{ patient.dob }}"
                       class="form-control" required></div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email"
                       value="{{ patient.email }}"
                       class="form-control" required></div>
            <div class="mb-3">
                <label>Glucose</label>
                <input type="number" 
                       name="glucose"
                       value="{{ patient.glucose }}"
                       class="form-control" required></div>
            <div class="mb-3">
                <label>Hemoglobin</label>
                <input type="number" 
                       name="hemoglobin"
                       value="{{ patient.hemoglobin }}"
                       class="form-control" required></div>
            <div class="mb-3">
                <label>Cholesterol</label>
                <input type="number" 
                       name="cholesterol"
                       value="{{ patient.cholesterol }}"
                       class="form-control" required></div>
            <button class="btn btn-success w-100">Update Patient Data</button>

        </form>
    </div>
</div>
</body>
</html>
